  </g>
  <text x="300" y="212" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" letter-spacing="2.5" fill="#7a745f">MAP THUMBNAIL</text>
  <rect x="0.75" y="0.75" width="598.5" height="398.5" fill="none" stroke="#cfc7ad" stroke-width="1.5"/>
