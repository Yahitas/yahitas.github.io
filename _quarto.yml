project:
  type: website
  output-dir: _site

website:
  title: "Kyle Cahitas"
  description: "Environmental data science, GIS, and applied machine learning"
  site-url: https://yahitas.github.io
  repo-url: https://github.com/Yahitas/yahitas.github.io
  
  navbar:
    left:
      - text: Research
        href: research/index.qmd
      - text: Maps
        href: maps/index.qmd
      - text: Job Search
        href: job-search/index.qmd
      - text: Blog
        href: blog/index.qmd
      - text: Photography
        href: photos/index.qmd
      - text: Thesis
        href: thesis/index.qmd
      - text: CV
        href: cv.qmd
    right:
      - icon: github
        href: https://github.com/Yahitas
      - icon: envelope
        href: mailto:kcahitas@calpoly.edu
  
  page-footer:
    center: "© 2026 Kyle Cahitas | Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: theme.scss   # Quadrangle — the custom topographic theme
      dark: darkly         # clean stock dark mode (toggle in the navbar)
    css: styles.css        # small extra tweaks live here
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    highlight-style: github

execute:
  freeze: auto
  echo: true
  message: false
  warning: false
  error: true



